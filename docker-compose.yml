services:
  iam-service:
    build:
      context: ./apps/iam-service
    environment:
      APP_NAME: iam-service
      HTTP_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      DATABASE_DSN: postgres://${IAM_DATABASE_USER}:${IAM_DATABASE_PASSWORD}@${IAM_DATABASE_HOST}:${IAM_DATABASE_PORT}/${IAM_DATABASE_NAME}?sslmode=${IAM_DATABASE_SSLMODE:-disable}
      SUPERADMIN_INITIAL_PASSWORD: ${SUPERADMIN_INITIAL_PASSWORD:-admin123}
    ports:
      - "8081:8080"
    env_file:
      - .env

  platform-service:
    build:
      context: ./apps/platform-service
    environment:
      APP_NAME: platform-service
      HTTP_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:9090
      LOG_LEVEL: info
      DATABASE_DSN: postgres://${COMMON_DATABASE_USER:-arda_common}:${COMMON_DATABASE_PASSWORD:-123456}@${COMMON_DATABASE_HOST:-host.docker.internal}:${COMMON_DATABASE_PORT:-5432}/${COMMON_DATABASE_NAME:-common}?sslmode=${COMMON_DATABASE_SSLMODE:-disable}
      NATS_URL: ${NATS_URL:-}
    ports:
      - "8091:8080"
      - "9091:9090"
    env_file:
      - .env

  media-service:
    build:
      context: ./apps/media-service
    environment:
      APP_NAME: media-service
      HTTP_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:9090
      LOG_LEVEL: info
      DATABASE_DSN: postgres://${MEDIA_DATABASE_USER:-arda_media}:${MEDIA_DATABASE_PASSWORD:-123456}@${MEDIA_DATABASE_HOST:-host.docker.internal}:${MEDIA_DATABASE_PORT:-5432}/${MEDIA_DATABASE_NAME:-media}?sslmode=${MEDIA_DATABASE_SSLMODE:-disable}
      NATS_URL: ${NATS_URL:-}
      STORAGE_ENDPOINT: ${GARAGE_ENDPOINT:-}
      STORAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-}
      STORAGE_BUCKET: ${GARAGE_BUCKET:-media}
      STORAGE_REGION: ${GARAGE_REGION:-garage}
      STORAGE_FORCE_PATH_STYLE: ${GARAGE_FORCE_PATH_STYLE:-true}
    ports:
      - "8092:8080"
      - "9092:9090"
    env_file:
      - .env

  auth-gateway:
    build:
      context: .
      dockerfile: apps/auth-gateway/Dockerfile
    environment:
      APP_NAME: auth-gateway
      HTTP_ADDR: 0.0.0.0:8080
      LOG_LEVEL: debug
      IAM_SERVICE_URL: http://iam-service:8080
      IAM_CONTEXT_CACHE_TTL_SECONDS: 60
      HRM_SERVICE_URL: http://hrm-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      TOKEN_STRATEGY: jwks
      JWKS_URL: https://auth.arda.io.vn/.well-known/jwks.json
      INTROSPECTION_URL: https://auth.arda.io.vn/oauth2/introspect
      INTROSPECTION_CLIENT_ID: ${INTROSPECTION_CLIENT_ID}
      INTROSPECTION_CLIENT_SECRET: ${INTROSPECTION_CLIENT_SECRET}
      POLICY_FILE: configs/policy.yaml
      RECENT_AUTH_WINDOW_SECONDS: 300
    ports:
      - "8082:8080"
    env_file:
      - .env
    depends_on:
      - iam-service
      - hrm-service
      - notification-service

  mock-token:
    build:
      context: ./tools/mock-token
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: https://auth.arda.io.vn
      JWT_AUDIENCE: arda-api
      SUBJECT: dev-admin-sub
      HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "8083:8080"
    env_file:
      - .env
    depends_on:
      - auth-gateway

  workflow-service:
    build:
      context: ./apps/workflow-service
    environment:
      APP_NAME: workflow-service
      HTTP_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      DATABASE_DSN: postgres://arda_workflow:123456@${IAM_DATABASE_HOST}:${IAM_DATABASE_PORT}/workflow?sslmode=${IAM_DATABASE_SSLMODE:-disable}
      ZEEBE_ADDR: ${ZEEBE_ADDR:-192.168.100.201:30650}
      GRPC_ADDR: 0.0.0.0:9090
      CRM_GRPC_ADDR: crm-service:9090
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
    ports:
      - "8093:8080"
      - "9093:9090"
    env_file:
      - .env

  crm-service:
    build:
      context: ./apps/crm-service
    environment:
      APP_NAME: crm-service
      HTTP_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      DATABASE_DSN: postgres://arda_crm:123456@${IAM_DATABASE_HOST}:${IAM_DATABASE_PORT}/crm?sslmode=${IAM_DATABASE_SSLMODE:-disable}
      GRPC_ADDR: 0.0.0.0:9090
      WORKFLOW_GRPC_ADDR: workflow-service:9090
    ports:
      - "8094:8080"
      - "9094:9090"
    env_file:
      - .env
    depends_on:
      - workflow-service

  hrm-service:
    build:
      context: ./apps/hrm-service
    environment:
      APP_NAME: hrm-service
      HTTP_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      DATABASE_DSN: postgres://arda_hrm:123456@${IAM_DATABASE_HOST}:${IAM_DATABASE_PORT}/hrm?sslmode=${IAM_DATABASE_SSLMODE:-disable}
      WORKFLOW_GRPC_ADDR: workflow-service:9090
    ports:
      - "8097:8080"
    env_file:
      - .env
    depends_on:
      - workflow-service

  notification-service:
    build:
      context: ./apps/notification-service
    environment:
      APP_NAME: notification-service
      HTTP_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      DATABASE_DSN: postgres://arda_notification:123456@${IAM_DATABASE_HOST}:${IAM_DATABASE_PORT}/notification?sslmode=${IAM_DATABASE_SSLMODE:-disable}
      NATS_URL: ${NATS_URL:-}
    ports:
      - "8095:8080"
    env_file:
      - .env
