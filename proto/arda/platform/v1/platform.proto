syntax = "proto3";

package arda.platform.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/arda-labs/arda/libs/go/arda-proto/platform/v1;platformv1";

service PlatformService {
  rpc ListParameters(ListParametersRequest) returns (ListParametersResponse);
  rpc UpsertParameter(UpsertParameterRequest) returns (Parameter);
  rpc ResolveParameter(ResolveParameterRequest) returns (Parameter);

  rpc ListLookupCategories(ListLookupCategoriesRequest) returns (ListLookupCategoriesResponse);
  rpc UpsertLookupCategory(UpsertLookupCategoryRequest) returns (LookupCategory);
  rpc ListLookupValues(ListLookupValuesRequest) returns (ListLookupValuesResponse);
  rpc UpsertLookupValue(UpsertLookupValueRequest) returns (LookupValue);

  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization);

  rpc ListAdminUnits(ListAdminUnitsRequest) returns (ListAdminUnitsResponse);
  rpc UpsertAdminUnit(UpsertAdminUnitRequest) returns (AdminUnit);
}

message ScopeSelector {
  string tenant_id = 1;
  string scope_type = 2;
  string scope_id = 3;
}

message Parameter {
  string id = 1;
  string tenant_id = 2;
  string key = 3;
  string value = 4;
  string value_type = 5;
  string scope_type = 6;
  string scope_id = 7;
  string description = 8;
  bool is_secret = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ListParametersRequest {
  ScopeSelector scope = 1;
  string locale = 2;
}

message ListParametersResponse {
  repeated Parameter parameters = 1;
}

message UpsertParameterRequest {
  Parameter parameter = 1;
}

message ResolveParameterRequest {
  string tenant_id = 1;
  string key = 2;
  repeated ScopeSelector scopes = 3;
  string locale = 4;
}

message LookupCategory {
  string id = 1;
  string tenant_id = 2;
  string code = 3;
  string name = 4;
  string scope_type = 5;
  string scope_id = 6;
  bool is_system = 7;
  string description = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ListLookupCategoriesRequest {
  ScopeSelector scope = 1;
  string locale = 2;
}

message ListLookupCategoriesResponse {
  repeated LookupCategory categories = 1;
}

message UpsertLookupCategoryRequest {
  LookupCategory category = 1;
}

message LookupValue {
  string id = 1;
  string category_id = 2;
  string code = 3;
  string name = 4;
  int32 sort_order = 5;
  bool is_active = 6;
  string metadata_json = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ListLookupValuesRequest {
  string category_code = 1;
  string locale = 2;
}

message ListLookupValuesResponse {
  repeated LookupValue values = 1;
}

message UpsertLookupValueRequest {
  string category_code = 1;
  LookupValue value = 2;
}

message Organization {
  string id = 1;
  string tenant_id = 2;
  string parent_id = 3;
  string code = 4;
  string name = 5;
  string org_type = 6;
  string admin_unit_code = 7;
  string address = 8;
  bool is_active = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ListOrganizationsRequest {
  string tenant_id = 1;
  string locale = 2;
}

message ListOrganizationsResponse {
  repeated Organization organizations = 1;
}

message CreateOrganizationRequest {
  Organization organization = 1;
}

message AdminUnit {
  string code = 1;
  string name = 2;
  string full_name = 3;
  string parent_code = 4;
  int32 level = 5;
  string unit_type = 6;
  string country_code = 7;
  string region_code = 8;
  string effective_from = 9;
  string effective_to = 10;
  bool is_active = 11;
  string metadata_json = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message ListAdminUnitsRequest {
  string parent_code = 1;
  int32 level = 2;
  string locale = 3;
}

message ListAdminUnitsResponse {
  repeated AdminUnit admin_units = 1;
}

message UpsertAdminUnitRequest {
  AdminUnit admin_unit = 1;
}

