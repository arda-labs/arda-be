syntax = "proto3";

package arda.common.v1;

option go_package = "github.com/arda-labs/arda/libs/go/arda-proto/common/v1;commonv1";

message PageRequest {
  int32 page = 1;
  int32 size = 2;
}

message PageResponse {
  int32 page = 1;
  int32 size = 2;
  int64 total = 3;
}

message ErrorDetail {
  string code = 1;
  string message = 2;
  map<string, string> fields = 3;
}

message AuditContext {
  string request_id = 1;
  string user_id = 2;
  string tenant_id = 3;
  string source_service = 4;
  string locale = 5;
}

