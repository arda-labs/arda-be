syntax = "proto3";

package arda.iam.v1;

option go_package = "github.com/arda-labs/arda/libs/go/arda-proto/iam/v1;iamv1";

service UserService {
  rpc GetUserBatch(GetUserBatchRequest) returns (GetUserBatchResponse);
}

message GetUserBatchRequest {
  repeated string user_ids = 1;
}

message UserInfo {
  string id = 1;
  string name = 2;
  string email = 3;
  string avatar_url = 4;
  string first_name = 5;
  string last_name = 6;
  string department = 7;
  string title = 8;
}

message GetUserBatchResponse {
  repeated UserInfo users = 1;
}
