name: images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/arda-be

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-gateway
            image: auth-gateway
            context: .
            file: apps/auth-gateway/Dockerfile
          - service: iam-service
            image: iam-service
            context: .
            file: apps/iam-service/Dockerfile
          - service: platform-service
            image: platform-service
            context: .
            file: apps/platform-service/Dockerfile
          - service: finance-service
            image: finance-service
            context: .
            file: apps/finance-service/Dockerfile
          - service: media-service
            image: media-service
            context: .
            file: apps/media-service/Dockerfile
          - service: workflow-service
            image: workflow-service
            context: .
            file: apps/workflow-service/Dockerfile
          - service: crm-service
            image: crm-service
            context: .
            file: apps/crm-service/Dockerfile
          - service: notification-service
            image: notification-service
            context: .
            file: apps/notification-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-manifests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update image tags
        run: |
          set -euo pipefail
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/auth-gateway:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/auth-gateway:${GITHUB_SHA}#" deployments/k8s/apps/auth-gateway.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/iam-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/iam-service:${GITHUB_SHA}#" deployments/k8s/apps/iam-service.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/platform-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/platform-service:${GITHUB_SHA}#" deployments/k8s/apps/platform-service.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/finance-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/finance-service:${GITHUB_SHA}#" deployments/k8s/apps/finance-service.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/media-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/media-service:${GITHUB_SHA}#" deployments/k8s/apps/media-service.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/workflow-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/workflow-service:${GITHUB_SHA}#" deployments/k8s/apps/workflow-service.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/crm-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/crm-service:${GITHUB_SHA}#" deployments/k8s/apps/crm-service.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/notification-service:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/notification-service:${GITHUB_SHA}#" deployments/k8s/apps/notification-service.yaml

      - name: Commit manifest image tags
        run: |
          set -euo pipefail
          if git diff --quiet -- deployments/k8s/apps; then
            echo "No manifest image tag changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/apps
          git commit -m "chore: update backend image tags to ${GITHUB_SHA}"
          git push
