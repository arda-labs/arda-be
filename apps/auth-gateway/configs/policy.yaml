routes:
  - id: iam-public
    path: /api/iam/public/**
    auth: false
    risk: public

  - id: iam-me
    path: /api/iam/me
    methods: [GET]
    auth: true
    risk: low

  - id: iam-me-subtree
    path: /api/iam/me/**
    auth: true
    risk: low

  - id: iam-session-config
    path: /api/iam/session/config
    methods: [GET]
    auth: true
    risk: low

  - id: iam-users-read
    path: /api/iam/users/**
    methods: [GET]
    auth: true
    risk: medium
    permissions:
      - iam.user.read

  - id: iam-users-write
    path: /api/iam/users/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - iam.user.manage

  - id: admin-read
    path: /api/admin/**
    methods: [GET]
    auth: true
    risk: medium
    permissions:
      - iam.user.read

  - id: admin-write
    path: /api/admin/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - iam.user.manage

  - id: admin-groups-read
    path: /api/admin/groups/**
    methods: [GET]
    auth: true
    risk: medium
    permissions:
      - iam.group.read

  - id: admin-groups-write
    path: /api/admin/groups/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - iam.group.manage

  - id: admin-groups-root-read
    path: /api/admin/groups
    methods: [GET]
    auth: true
    risk: medium
    permissions:
      - iam.group.read

  - id: admin-groups-root-write
    path: /api/admin/groups
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - iam.group.manage

  - id: mdm-read
    path: /api/mdm/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - mdm.read

  - id: platform-public-branding
    path: /api/platform/public/branding
    methods: [GET]
    auth: false
    risk: public

  - id: platform-read
    path: /api/platform/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - platform.read

  - id: platform-write
    path: /api/platform/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: medium
    permissions:
      - platform.manage

  - id: crm-customer-read
    path: /api/crm/customers/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - crm.customer.read

  - id: hrm-read
    path: /api/hrm/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - hrm.read

  - id: hrm-write
    path: /api/hrm/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: medium
    permissions:
      - hrm.manage
