routes:
  - id: iam-public
    path: /api/iam/public/**
    auth: false
    risk: public

  - id: iam-me
    path: /api/iam/me
    methods: [GET]
    auth: true
    risk: low

  - id: iam-users-read
    path: /api/iam/users/**
    methods: [GET]
    auth: true
    risk: medium
    permissions:
      - iam.user.read

  - id: iam-users-write
    path: /api/iam/users/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - iam.user.manage

  - id: admin-read
    path: /api/admin/**
    methods: [GET]
    auth: true
    risk: medium
    permissions:
      - iam.user.read

  - id: admin-write
    path: /api/admin/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - iam.user.manage

  - id: mdm-read
    path: /api/mdm/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - mdm.read

  - id: platform-read
    path: /api/platform/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - platform.read

  - id: platform-write
    path: /api/platform/**
    methods: [POST, PUT, PATCH, DELETE]
    auth: true
    risk: high
    permissions:
      - platform.manage

  - id: crm-customer-read
    path: /api/crm/customers/**
    methods: [GET]
    auth: true
    risk: low
    permissions:
      - crm.customer.read
