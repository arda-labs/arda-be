version: '3'

tasks:
  build:
    cmds:
      - go build -o bin/workflow-service ./cmd/workflow-service

  run:
    cmds:
      - go run ./cmd/workflow-service

  test:
    cmds:
      - go test ./...

  lint:
    cmds:
      - go vet ./...

  docker:
    cmds:
      - docker build -t workflow-service:latest .
