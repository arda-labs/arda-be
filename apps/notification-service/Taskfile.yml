version: '3'

tasks:
  build:
    cmds:
      - go build -o bin/notification-service ./cmd/notification-service

  run:
    cmds:
      - go run ./cmd/notification-service

  test:
    cmds:
      - go test ./...

  lint:
    cmds:
      - go vet ./...

  docker:
    cmds:
      - docker build -t notification-service:latest .
