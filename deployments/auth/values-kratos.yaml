replicaCount: 1

namespace: auth

kratos:
  automigration:
    enabled: true

  config:
    dsn: postgres://arda_kratos:123456@pg-main-rw.database.svc.cluster.local:5432/kratos?sslmode=disable

    serve:
      public:
        base_url: https://identity.arda.io.vn/
        cors:
          enabled: true
          allowed_origins:
            - http://localhost:5000
            - https://arda.io.vn
            - https://auth.arda.io.vn
            - https://identity.arda.io.vn
          allowed_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          allowed_headers:
            - Authorization
            - Cookie
            - Content-Type
            - X-Session-Token
          exposed_headers:
            - Content-Type
            - Set-Cookie
          allow_credentials: true
      admin:
        base_url: http://kratos-admin.auth.svc.cluster.local:4434/

    selfservice:
      default_browser_return_url: https://arda.io.vn/
      allowed_return_urls:
        - http://localhost:5000/
        - http://localhost:5000/login
        - http://localhost:5000/callback
        - https://arda.io.vn/
        - https://arda.io.vn/login
        - https://arda.io.vn/callback
        - https://auth.arda.io.vn/

      methods:
        password:
          enabled: true

      flows:
        login:
          ui_url: https://arda.io.vn/login
        registration:
          ui_url: https://arda.io.vn/registration
        recovery:
          enabled: true
          ui_url: https://arda.io.vn/recovery
        verification:
          enabled: false
          ui_url: https://arda.io.vn/verification
        settings:
          ui_url: https://arda.io.vn/settings
        logout:
          after:
            default_browser_return_url: https://arda.io.vn/login

    log:
      level: debug
      format: text
      leak_sensitive_values: true

    secrets:
      default:
        - kratos-default-secret-arda-2026-fixed-key
      cookie:
        - kratos-cookie-secret-arda-2026-fixed-key

    courier:
      smtp:
        connection_uri: smtp://test:test@mailhog.auth.svc.cluster.local:1025/?skip_ssl_verify=true

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/identity.schema.json

    hashers:
      algorithm: bcrypt
      bcrypt:
        cost: 10

    session:
      lifespan: 720h
      cookie:
        same_site: Lax

  identitySchemas:
    "identity.schema.json": |
      {
        "$id": "https://arda.io.vn/schemas/identity.schema.json",
        "$schema": "http://json-schema.org/draft-07/schema#",
        "title": "Arda Identity",
        "type": "object",
        "properties": {
          "traits": {
            "type": "object",
            "properties": {
              "email": {
                "type": "string",
                "format": "email",
                "title": "Email",
                "ory.sh/kratos": {
                  "credentials": {
                    "password": {
                      "identifier": true
                    }
                  },
                  "verification": {
                    "via": "email"
                  },
                  "recovery": {
                    "via": "email"
                  }
                }
              },
              "name": {
                "type": "string",
                "title": "Name"
              }
            },
            "required": ["email"],
            "additionalProperties": false
          }
        }
      }

ingress:
  public:
    enabled: true
    className: traefik
    hosts:
      - host: identity.arda.io.vn
        paths:
          - path: /
            pathType: Prefix

  admin:
    enabled: false
