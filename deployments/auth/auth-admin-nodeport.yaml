apiVersion: v1
kind: Service
metadata:
  name: hydra-admin-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: hydra
    app.kubernetes.io/instance: hydra
  ports:
    - name: http
      port: 4445
      targetPort: 4445
      nodePort: 30445
---
apiVersion: v1
kind: Service
metadata:
  name: kratos-admin-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kratos
    app.kubernetes.io/instance: kratos
  ports:
    - name: http
      port: 4434
      targetPort: 4434
      nodePort: 30446
