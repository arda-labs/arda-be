apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: media-service
          image: ghcr.io/arda-labs/arda-be/media-service:4d6ac06502846150414f20fab8fee06c379cc77b
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
            - name: MEDIA_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: MEDIA_DATABASE_DSN
            - name: MEDIA_NATS_URL
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: NATS_URL
                  optional: true
            - name: GARAGE_ENDPOINT
              value: http://garage.platform.svc.cluster.local:3900
            - name: GARAGE_REGION
              value: garage
            - name: GARAGE_BUCKET
              value: media
            - name: GARAGE_FORCE_PATH_STYLE
              value: "true"
            - name: GARAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: GARAGE_ACCESS_KEY
            - name: GARAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: GARAGE_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: arda-app
spec:
  selector:
    app: media-service
  ports:
    - name: http
      port: 8080
      targetPort: http
