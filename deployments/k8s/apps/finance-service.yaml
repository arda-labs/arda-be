apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: finance-service
          image: ghcr.io/arda-labs/arda-be/finance-service:4d6ac06502846150414f20fab8fee06c379cc77b
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: FINANCE_DATABASE_DSN
            - name: PLATFORM_GRPC_ADDR
              value: platform-service:9090
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: NATS_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: arda-app
spec:
  selector:
    app: finance-service
  ports:
    - name: http
      port: 8080
      targetPort: http
