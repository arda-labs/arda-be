apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-service
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-service
  template:
    metadata:
      labels:
        app: platform-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: platform-service
          image: ghcr.io/arda-labs/arda-be/platform-service:4d6ac06502846150414f20fab8fee06c379cc77b
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: GRPC_ADDR
              value: 0.0.0.0:9090
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: PLATFORM_DATABASE_DSN
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: NATS_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: platform-service
  namespace: arda-app
spec:
  selector:
    app: platform-service
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
