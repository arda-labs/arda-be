apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: notification-service
          image: ghcr.io/arda-labs/arda-be/notification-service:f6da8d29d8d69623ae5aa10f668636f7f8f6614b
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: NOTIFICATION_DATABASE_DSN
            - name: ZEEBE_ADDR
              value: zeebe-gateway.platform.svc.cluster.local:26500
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: NATS_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: arda-app
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8080
      targetPort: http
