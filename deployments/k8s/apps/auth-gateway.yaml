apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-gateway
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-gateway
  template:
    metadata:
      labels:
        app: auth-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: auth-gateway
          image: ghcr.io/arda-labs/arda-be/auth-gateway:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
            - name: TOKEN_STRATEGY
              value: jwks
            - name: JWKS_URL
              value: https://auth.arda.io.vn/.well-known/jwks.json
            - name: IAM_SERVICE_URL
              value: http://iam-service:8080
            - name: PLATFORM_SERVICE_URL
              value: http://platform-service:8080
            - name: KRATOS_PUBLIC_URL
              value: https://identity.arda.io.vn
            - name: HYDRA_ADMIN_URL
              value: http://hydra-admin.auth.svc.cluster.local:4445
            - name: HYDRA_PUBLIC_URL
              value: https://auth.arda.io.vn
            - name: OAUTH_CLIENT_ID
              value: arda-shell
            - name: OAUTH_REDIRECT_URI
              value: http://localhost:5000/callback
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: REDIS_URL
            - name: INTROSPECTION_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: INTROSPECTION_CLIENT_ID
                  optional: true
            - name: INTROSPECTION_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: INTROSPECTION_CLIENT_SECRET
                  optional: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-gateway
  namespace: arda-app
spec:
  selector:
    app: auth-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
