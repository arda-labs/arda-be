apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: crm-service
          image: ghcr.io/arda-labs/arda-be/crm-service:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: CRM_DATABASE_DSN
            - name: ZEEBE_ADDR
              value: zeebe-gateway.platform.svc.cluster.local:26500
            - name: WORKFLOW_SERVICE_URL
              value: http://workflow-service:8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: crm-service
  namespace: arda-app
spec:
  selector:
    app: crm-service
  ports:
    - name: http
      port: 8080
      targetPort: http
