apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-service
  namespace: arda-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iam-service
  template:
    metadata:
      labels:
        app: iam-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: iam-service
          image: ghcr.io/arda-labs/arda-be/iam-service:4d6ac06502846150414f20fab8fee06c379cc77b
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: IAM_DATABASE_DSN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: arda-app-secrets
                  key: REDIS_URL
            - name: SUPERADMIN_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-service-secrets
                  key: SUPERADMIN_INITIAL_PASSWORD
                  optional: true
            - name: HYDRA_ADMIN_URL
              value: http://hydra-admin.auth.svc.cluster.local:4445
            - name: HYDRA_PUBLIC_URL
              value: https://auth.arda.io.vn
            - name: HYDRA_ISSUER_URL
              value: https://auth.arda.io.vn
            - name: HYDRA_CLIENT_ID
              value: arda-shell
            - name: HYDRA_REDIRECT_URI
              value: https://arda.io.vn/callback
            - name: KRATOS_ADMIN_URL
              value: http://kratos-admin.auth.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: iam-service
  namespace: arda-app
spec:
  selector:
    app: iam-service
  ports:
    - name: http
      port: 8080
      targetPort: http
