apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: arda-app
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "<github-user>",
          "password": "<pat-with-read-packages>",
          "auth": "<base64 github-user:pat>"
        }
      }
    }
