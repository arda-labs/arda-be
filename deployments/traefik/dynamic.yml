http:
  middlewares:
    arda-forward-auth:
      forwardAuth:
        address: "http://auth-gateway:8080/auth/check"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Subject"
          - "X-Username"
          - "X-User-Email"
          - "X-Tenant-Id"
          - "X-Roles"
          - "X-Permissions"
          - "X-Auth-Checked"

  routers:
    iam-public:
      rule: "PathPrefix(`/api/iam/public`)"
      service: iam-service
      entryPoints:
        - web

    iam-api:
      rule: "PathPrefix(`/api/iam`)"
      service: iam-service
      entryPoints:
        - web
      middlewares:
        - arda-forward-auth

    mdm-api:
      rule: "PathPrefix(`/api/mdm`)"
      service: mdm-service
      entryPoints:
        - web
      middlewares:
        - arda-forward-auth

    platform-api:
      rule: "PathPrefix(`/api/platform`)"
      service: platform-service
      entryPoints:
        - web
      middlewares:
        - arda-forward-auth

  services:
    iam-service:
      loadBalancer:
        servers:
          - url: "http://iam-service:8080"

    mdm-service:
      loadBalancer:
        servers:
          - url: "http://mdm-service:8080"

    platform-service:
      loadBalancer:
        servers:
          - url: "http://platform-service:8080"
